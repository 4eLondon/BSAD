<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Road Ready JA – Applications</title>
  <link rel="stylesheet" href="/public/css/dotnav.css" />
  <link rel="stylesheet" href="/public/css/form.css" />
</head>

<body>
  <!-- ── Top dot navigation ── -->
  <nav class="dot-nav">
    <div class="dot-nav__item">
      <a class="dot-nav__dot" href="/"></a>
      <span class="dot-nav__label">Home</span>
    </div>
    <div class="dot-nav__item">
      <a class="dot-nav__dot" href="/#about"></a>
      <span class="dot-nav__label">About Us</span>
    </div>
    <div class="dot-nav__item">
      <a class="dot-nav__dot" href="/#contact"></a>
      <span class="dot-nav__label">Contact</span>
    </div>

    <button id="theme-toggle" class="theme-toggle" aria-label="Switch to light mode">
    </button>

  </nav>

  <!-- Top bar -->
  <nav class="topbar">
    <img src="/public/images/logo.png" style="width: 160px; height: auto" />
  </nav>

  <!-- Page wrapper -->
  <div class="page">
    <div class="form-card">
      <!-- Card header -->
      <div class="card-head">
        <span class="eyebrow">Membership</span>
        <h1 class="page-title" id="page-title">New Application</h1>
        <div class="tab-group">
          <button class="tab active" id="tab-apply" onclick="switchTab('apply')">
            Apply
          </button>
          <button class="tab" id="tab-renew" onclick="switchTab('renew')">
            Renew / Replace
          </button>
        </div>
      </div>

      <!-- Card body -->
      <div class="card-body">
        <!-- Success panel (shared) -->
        <div class="success hidden" id="success-panel">
          <div class="success__icon">✓</div>
          <h2 class="success__title" id="success-title">Submitted</h2>
          <p class="success__sub">Your reference IDs have been generated.</p>
          <div class="success__ids">
            <div class="id-row">
              <span class="id-label">Application ID</span>
              <span class="id-val" id="out-app-id">—</span>
            </div>
            <div class="id-row">
              <span class="id-label">User ID</span>
              <span class="id-val" id="out-user-id">—</span>
            </div>
          </div>
          <a class="btn-submit" href="/pages/dashboard.html" style="text-decoration: none; margin-top: 1rem">
            Back to Dashboard
          </a>
        </div>

        <!-- ── APPLY FORM ── -->
        <form class="form-panel" id="form-apply" novalidate>
          <div class="frow">
            <div class="fgroup">
              <label class="flabel" for="a-name">Full Name</label>
              <input class="finput" id="a-name" type="text" placeholder="Jane Doe" />
              <span class="ferror" id="err-a-name"></span>
            </div>
          </div>

          <div class="frow pair">
            <div class="fgroup">
              <label class="flabel" for="a-email">Email</label>
              <input class="finput" id="a-email" type="email" placeholder="jane@example.com" />
              <span class="ferror" id="err-a-email"></span>
            </div>
            <div class="fgroup">
              <label class="flabel" for="a-trn">TRN</label>
              <input class="finput" id="a-trn" type="text" placeholder="000-000-000" maxlength="11" />
              <span class="ferror" id="err-a-trn"></span>
            </div>
          </div>

          <div class="frow pair">
            <div class="fgroup">
              <label class="flabel" for="a-dob">Date of Birth</label>
              <input class="finput" id="a-dob" type="date" />
              <span class="ferror" id="err-a-dob"></span>
            </div>
            <div class="fgroup">
              <label class="flabel" for="a-phone">Phone</label>
              <input class="finput" id="a-phone" type="tel" placeholder="876-000-0000" maxlength="12" />
              <span class="ferror" id="err-a-phone"></span>
            </div>
          </div>

          <button class="btn-submit" type="submit" id="apply-btn">
            Submit Application
          </button>
        </form>

        <!-- ── RENEW FORM ── -->
        <form class="form-panel hidden" id="form-renew" novalidate>
          <div class="frow">
            <div class="fgroup">
              <label class="flabel" for="r-name">Full Name</label>
              <input class="finput" id="r-name" type="text" placeholder="Jane Doe" />
              <span class="ferror" id="err-r-name"></span>
            </div>
          </div>

          <div class="frow pair">
            <div class="fgroup">
              <label class="flabel" for="r-trn">TRN</label>
              <input class="finput" id="r-trn" type="text" placeholder="000-000-000" maxlength="11" />
              <span class="ferror" id="err-r-trn"></span>
            </div>
            <div class="fgroup">
              <label class="flabel" for="r-licence">Licence Number</label>
              <input class="finput" id="r-licence" type="text" placeholder="L000-00000" />
              <span class="ferror" id="err-r-licence"></span>
            </div>
          </div>

          <div class="frow pair">
            <div class="fgroup">
              <label class="flabel" for="r-issue">Issue Date</label>
              <input class="finput" id="r-issue" type="date" />
              <span class="ferror" id="err-r-issue"></span>
            </div>
            <div class="fgroup">
              <label class="flabel" for="r-expiry">Expiry Date</label>
              <input class="finput" id="r-expiry" type="date" />
              <span class="ferror" id="err-r-expiry"></span>
            </div>
          </div>

          <div class="frow">
            <div class="fgroup">
              <label class="flabel" for="r-status">Status</label>
              <select class="fselect" id="r-status">
                <option value="" disabled selected>Select status</option>
                <option value="active">Active</option>
                <option value="expired">Expired</option>
                <option value="suspended">Suspended</option>
                <option value="lost">Lost</option>
                <option value="damaged">Damaged</option>
              </select>
              <span class="ferror" id="err-r-status"></span>
            </div>
          </div>

          <div class="frow pair">
            <div class="fgroup">
              <label class="flabel" for="r-payment">Payment Method</label>
              <select class="fselect" id="r-payment">
                <option value="" disabled selected>Select method</option>
                <option value="card">Credit / Debit Card</option>
                <option value="bank">Bank Transfer</option>
                <option value="cash">Cash</option>
              </select>
              <span class="ferror" id="err-r-payment"></span>
            </div>
            <div class="fgroup">
              <label class="flabel" for="r-amount">Amount (JMD)</label>
              <input class="finput" id="r-amount" type="number" placeholder="0.00" min="0" step="0.01" />
              <span class="ferror" id="err-r-amount"></span>
            </div>
          </div>

          <div class="frow">
            <div class="fgroup">
              <label class="flabel">Upload Document</label>
              <label class="file-drop" id="file-drop">
                <input type="file" id="r-file" accept=".pdf,.jpg,.jpeg,.png" />
                <span class="file-drop__text" id="file-label">
                  Click to upload or drag &amp; drop — PDF, JPG, PNG
                </span>
              </label>
              <span class="ferror" id="err-r-file"></span>
            </div>
          </div>

          <button class="btn-submit" type="submit" id="renew-btn">
            Submit Renewal
          </button>
        </form>
      </div>
      <!-- /card-body -->
    </div>
    <!-- /form-card -->
  </div>
  <!-- /page -->

  <div id="toast" class="toast"></div>

  <script src="/public/js/theme.js"></script>
  <script type="module" src="/public/js/form.js"></script>
</body>

</html>
