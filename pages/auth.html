<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In / Register — Road Ready JA</title>
  <link rel="stylesheet" href="/public/css/auth.css" />
  <link rel="stylesheet" href="/public/css/dotnav.css" />
</head>

<body>
  <!-- ── Top dot navigation ── -->
  <nav class="dot-nav">
    <div class="dot-nav__item">
      <a class="dot-nav__dot" href="/"></a>
      <span class="dot-nav__label">Home</span>
    </div>
    <div class="dot-nav__item">
      <a class="dot-nav__dot" href="/#about"></a>
      <span class="dot-nav__label">About Us</span>
    </div>
    <div class="dot-nav__item">
      <a class="dot-nav__dot" href="/#contact"></a>
      <span class="dot-nav__label">Contact</span>
    </div>
    <button id="theme-toggle" class="theme-toggle" aria-label="Switch to light mode"></button>
  </nav>

  <!-- Top bar -->
  <nav class="topbar">
    <img src="/public/images/logo.png" style="width: 160px; height: auto" />
  </nav>

  <div class="card" id="card">
    <!-- LEFT PANEL -->
    <div class="panel panel-left">
      <div class="brand">
        <span>Road Ready JA</span>
      </div>

      <div class="panel-content">
        <!-- Register state -->
        <div class="panel-msg" id="msg-register">
          <h2>Get Registered</h2>
          <p>
            To use our services<br />please sign up with your personal info
          </p>
          <button class="btn btn--outline" id="go-login">to Log In</button>
        </div>

        <!-- Login state -->
        <div class="panel-msg panel-msg--hidden" id="msg-login">
          <h2>Welcome Back</h2>
          <p>
            Enter your details to log in.<br />
            We are ready for you
          </p>
          <button class="btn btn--outline" id="go-register">
            to Register
          </button>
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="panel panel-right">
      <!-- Register Form -->
      <div class="form-wrap" id="form-register">
        <h1>Create Account</h1>

        <div class="field">
          <input type="text" placeholder="Full Name" />
        </div>
        <div class="field">
          <input type="email" placeholder="Email" />
        </div>
        <div class="field">
          <input type="password" placeholder="Password" />
        </div>
        <div class="field">
          <input type="password" placeholder="Confirm Password" />
        </div>

        <button class="btn btn-main" id="signup-btn">Sign Up</button>
      </div>

      <!-- Login Form -->
      <div class="form-wrap form-wrap--hidden" id="form-login">
        <h1>Sign In</h1>

        <div class="field">
          <input type="email" placeholder="Email" />
        </div>
        <div class="field">
          <input type="password" placeholder="Password" />
        </div>

        <a class="forgot-link" href="/pages/forgot.html">Forgot your password?</a>
        <button class="btn btn-main">Sign In</button>
      </div>
    </div>
  </div>

  <script type="module" src="/public/js/auth.js"></script>
  <script src="/public/js/theme.js"></script>
</body>

</html>
